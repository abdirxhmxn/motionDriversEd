<!DOCTYPE html>
<html lang="en">

<head>
    <!-- Basic Meta Tags -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Page Title (Critical for SEO & CTR) -->
    <title>Register for Driving Lessons | Motion Drivers Ed - Book Your Class or Road Test Prep</title>

    <!-- Meta Description (Shows in Google Search Results) -->
    <meta name="description"
        content="Register now for professional driving lessons, road test preparation, or teen driver education classes at Motion Drivers Ed. Flexible scheduling, certified instructors, and easy online booking. Book today!">

    <!-- Keywords (Optional but helpful for local SEO) -->
    <meta name="keywords"
        content="driving lessons near me, drivers ed registration, road test booking, teen driving class, driving school enrollment, behind the wheel training, DMV road test prep, Motion Drivers Ed">

    <!-- Robots (Allow indexing & following) -->
    <meta name="robots" content="index, follow">

    <!-- Canonical URL (Prevents duplicate content issues) -->
    <link rel="canonical" href="https://www.motiondriversed.com/register.html">

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Register for Driving Lessons | Motion Drivers Ed">
    <meta property="og:description"
        content="Book your driving lesson, road test prep, or full driver education class today. Certified instructors. Easy online registration.">
    <meta property="og:url" content="https://www.motiondriversed.com/register.html">
    <meta property="og:site_name" content="Motion Drivers Ed">
    <meta property="og:image" content="https://www.motiondriversed.com/images/og-register.jpg">
    <meta property="og:image:alt" content="Student registering for driving lessons at Motion Drivers Ed">
    <meta property="og:locale" content="en_US">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Register for Driving Lessons | Motion Drivers Ed">
    <meta name="twitter:description"
        content="Book your class or private lesson today. Fast registration. Certified instructors.">
    <meta name="twitter:image" content="https://www.motiondriversed.com/images/twitter-register.jpg">
    <meta name="twitter:site" content="@YourTwitterHandle"> <!-- Optional: add your handle -->

    <!-- Favicon Set (All devices & sizes) -->
    <link rel="icon" href="images/favicon.ico" type="images/favicon_io (4)/favicon.ico">
    <link rel="apple-touch-icon" sizes="180x180" href="images/favicon_io (4)/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="images/favicon_io (4)/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="images/favicon_io (4)/favicon-16x16.png">
    <link rel="manifest" href="images/favicon_io (4)/site.webmanifest">

    <!-- Preconnect & Font Optimization -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">

    <!-- CSS Files -->
    <link href="css/bootstrap.css" rel="stylesheet">
    <link href="css/fontawesome-all.css" rel="stylesheet">
    <link href="css/styles.css" rel="stylesheet">

    <!-- Structured Data (JSON-LD) - Helps Google show rich results -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebPage",
      "name": "Register for Driving Lessons",
      "description": "Easy online registration for driving lessons, road test prep, and driver education classes at Motion Drivers Ed.",
      "url": "https://www.motiondriversed.com/register.html",
      "publisher": {
        "@type": "Organization",
        "name": "Motion Drivers Ed",
        "logo": {
          "@type": "ImageObject",
          "url": "https://www.motiondriversed.com/images/logo.png"
        }
      },
      "mainEntity": {
        "@type": "Service",
        "serviceType": "Driver Education and Training",
        "areaServed": "Your City and surrounding areas",
        "offers": {
          "@type": "Offer",
          "name": "Driving Lessons & Classes",
          "url": "https://www.motiondriversed.com/register.html"
        }
      }
    }
    </script>

    <!-- Google Analytics / Tag Manager (Optional - Add if you have it) -->
    <!-- Global site tag (gtag.js) - Google Analytics -->
    <!-- <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-XXXXXXXXXX');
    </script> -->
    <style>
        html,
        body {
            background: linear-gradient(to bottom right, var(--bg-dark-overlay), var(--bg-dark-overlay)),
                url('../images/header-background.jpg') center center / cover no-repeat fixed;
            font-family: 'Montserrat', sans-serif;
            min-height: 100vh;
            margin: 0;
        }

        .register-wrapper {
            max-width: 960px;
            margin: 0 auto;
            padding: 1rem;
        }

        .service-banner {
            background: linear-gradient(135deg, #0b1224, #111827);
            color: #ffffff;
            padding: 2rem;
            text-align: center;
            border-radius: 18px;
            margin-bottom: 2rem;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.2);
            border: 2px solid #fff;
        }

        .service-banner h2 {
            font-size: clamp(1.6rem, 1.2vw + 1.1rem, 2.3rem);
            color: #ffffff;
        }

        .service-banner h4 {
            font-size: clamp(1.25rem, 1vw + 0.7rem, 1.8rem);
            color: #ffffff;
            margin: 0.35rem 0;
        }

        .service-banner p {
            color: #e5e7eb;
            font-size: clamp(1rem, 0.6vw + 0.9rem, 1.15rem);
        }

        .summary-box,
        .form-container form {
            background: #fff;
            border-radius: 18px;
            padding: 1.75rem;
            box-shadow: 0 16px 40px rgba(15, 23, 42, 0.12);
            margin-bottom: 1.75rem;
        }

        .success-message {
            display: none;
            text-align: center;
            padding: 2rem;
            background: #0f172a;
            color: #f8fafc;
            border-radius: 18px;
        }

        .contact-row {
            display: flex;
            flex-wrap: nowrap;
            gap: 1rem;
            align-items: flex-start;
        }

        .contact-row .phone-col,
        .contact-row .date-col {
            flex: 1 1 50%;
            min-width: 0;
        }

        .contact-row .time-col {
            flex: 1 1 100%;
            min-width: 0;
        }

        #classTimeGroup {
            display: none;
        }

        .time-range {
            display: flex;
            gap: 0.5rem;
            align-items: center;
            flex-wrap: nowrap;
        }

        .time-range .time-separator {
            font-weight: 700;
            color: #111827;
        }

        .time-range select {
            flex: 1 1 50%;
            min-width: 0;
        }

        .contact-row .form-group {
            display: flex;
            flex-direction: column;
            padding: 0.25rem;
        }

        .button-row {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
        }

        .button-row .btn {
            flex: 1 1 240px;
        }

        .btn-outline-lg {
            background: transparent;
            color: #000;
            border: 2px solid #000;
        }

        .contact-row .form-control {
            height: 48px;
        }

        .contact-row.class-mode .time-col {
            display: none;
        }

        .form-control {
            border-radius: 12px;
            padding: 0.9rem 1rem;
            width: 100%;
            min-width: 0;
        }

        .button-row .btn {
            background: #000;
            color: #fff;
            border: none;
            padding: 1rem;
            font-size: clamp(1rem, 1vw + 0.4rem, 1.25rem);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.35rem;
            white-space: nowrap;
            line-height: 1.2;
        }

        /* Keep first/last name aligned side by side while allowing shrink */
        .name-row {
            display: flex;
            gap: 0.75rem;
            flex-wrap: nowrap;
        }

        .name-row .form-group {
            flex: 1 1 50%;
            min-width: 0;
        }

        #preferredDate,
        #firstName,
        #lastName,
        #email,
        #phone {
            height: 48px !important;
        }

        @media (max-width: 768px) {
            .form-container form {
                padding: 1.25rem;
            }

            .form-control {
                padding: 0.8rem 0.9rem;
                font-size: 0.95rem;
            }

            .name-row {
                gap: 0.6rem;
            }

            .button-row {
                flex-direction: column;
            }

            .button-row .btn {
                font-size: 1rem;
                padding: 0.9rem 1rem;
                white-space: normal;
            }
        }

        @media (max-width: 640px) {
            .contact-row {
                flex-wrap: wrap;
                gap: 0.5rem;
            }

            .name-row {
                gap: 0.5rem;
            }

            .form-control {
                padding: 0.75rem 0.85rem;
            }

            .button-row .btn {
                font-size: 0.95rem;
                line-height: 1.3;
            }
        }
    </style>
</head>

<body>

    <div class="container py-5 register-wrapper">
        <div class="row">
            <div class="col-lg-12">

                <!-- Service Banner -->
                <div class="service-banner">
                    <h2 id="serviceName">Loading...</h2>
                    <h4 id="servicePrice">$0.00</h4>
                    <p id="serviceDescription"></p>
                </div>

                <!-- Summary -->
                <div class="summary-box">
                    <h4>Booking Summary</h4>
                    <p><strong>Service:</strong> <span id="summaryService">-</span></p>
                    <p><strong>Date:</strong> <span id="summaryDate">Not selected</span></p>
                    <p><strong>Time:</strong> <span id="summaryTime">Not selected</span></p>
                    <p><strong>Total:</strong> <span id="summaryTotal">$0.00</span></p>
                </div>

                <!-- Success Message -->
                <div id="successMessage" class="success-message">
                    <h3>Booking Confirmed!</h3>
                    <p>Your reference: <strong id="bookingRef"></strong></p>
                    <p>Redirecting you to Square to complete payment...</p>
                </div>

                <!-- Visible Form (User fills this) -->
                <div class="form-container" id="formContainer">
                    <form id="bookingForm">
                        <div class="form-row name-row">
                            <div class="form-group col-md-6">
                                <label>First Name *</label>
                                <input type="text" class="form-control" id="firstName" placeholder="First name"
                                    required>
                            </div>
                            <div class="form-group col-md-6">
                                <label>Last Name *</label>
                                <input type="text" class="form-control" id="lastName" placeholder="Last name" required>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Email *</label>
                            <input type="email" class="form-control" id="email" placeholder="you@example.com" required>
                        </div>
                        <div class="form-row contact-row" id="contactRow">
                            <div class="form-group phone-col">
                                <label>Phone *</label>
                                <input type="tel" class="form-control" id="phone" placeholder="123-456-7890" required>
                            </div>
                            <div class="form-group date-col">
                                <label id="dateLabel">Preferred Date *</label>
                                <input type="date" class="form-control" id="preferredDate" required>
                            </div>
                            <div class="form-group time-col" id="timeGroup">
                                <label>Preferred Time *</label>
                                <select class="form-control" id="preferredTime">
                                    <option value="">Select time...</option>
                                    <option value="09:00">9:00 AM</option>
                                    <option value="10:00">10:00 AM</option>
                                    <option value="11:00">11:00 AM</option>
                                    <option value="14:00">2:00 PM</option>
                                    <option value="15:00">3:00 PM</option>
                                    <option value="16:00">4:00 PM</option>
                                    <option value="17:00">5:00 PM</option>
                                </select>
                            </div>
                            <div class="form-group time-col" id="classTimeGroup">
                                <label>Class Time *</label>
                                <div class="time-range">
                                    <select class="form-control" id="classStartTime">
                                        <option value="">Start...</option>
                                        <option value="09:00">9:00 AM</option>
                                        <option value="10:00">10:00 AM</option>
                                        <option value="11:00">11:00 AM</option>
                                        <option value="14:00">2:00 PM</option>
                                        <option value="15:00">3:00 PM</option>
                                        <option value="16:00">4:00 PM</option>
                                        <option value="17:00">5:00 PM</option>
                                    </select>
                                    <span class="time-separator">to</span>
                                    <select class="form-control" id="classEndTime">
                                        <option value="">End...</option>
                                        <option value="12:00">12:00 PM</option>
                                        <option value="13:00">1:00 PM</option>
                                        <option value="14:00">2:00 PM</option>
                                        <option value="17:00">5:00 PM</option>
                                        <option value="18:00">6:00 PM</option>
                                        <option value="19:00">7:00 PM</option>
                                        <option value="20:00">8:00 PM</option>
                                    </select>
                                </div>
                                <small class="text-muted">Select the start and end time for your class.</small>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Notes (optional)</label>
                            <textarea class="form-control" id="notes" rows="3"></textarea>
                        </div>
                        <div class="button-row">
                            <button type="submit" id="payFullBtn" class="btn btn-solid-lg">
                                PAY FULL PRICE → $ <span class="dynamicPrice">0.00</span>
                            </button>
                            <button type="submit" id="payDepositBtn" class="btn btn-outline-lg">
                                COMPLETE DEPOSIT → $ <span class="dynamicPrice">0.00</span>
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- HIDDEN FORM THAT ACTUALLY SENDS TO FORMSPREE -->
    <form id="formspreeHiddenForm" action="" method="POST" target="hidden-iframe" style="display:none;">
        <input type="hidden" name="reference" id="fs_ref">
        <input type="hidden" name="service" id="fs_service">
        <input type="hidden" name="price" id="fs_price">
        <input type="hidden" name="firstName" id="fs_firstName">
        <input type="hidden" name="lastName" id="fs_lastName">
        <input type="hidden" name="email" id="fs_email">
        <input type="hidden" name="phone" id="fs_phone">
        <input type="hidden" name="preferredDate" id="fs_date">
        <input type="hidden" name="preferredTime" id="fs_time">
        <input type="hidden" name="classStartTime" id="fs_classStartTime">
        <input type="hidden" name="classEndTime" id="fs_classEndTime">
        <input type="hidden" name="notes" id="fs_notes">
        <input type="hidden" name="_subject" value="New Booking from Motion Drivers Ed">
        <input type="hidden" name="_replyto" id="fs_replyto">
        <input type="text" name="_gotcha" style="display:none">
    </form>

    <!-- Prevents new tab -->
    <iframe name="hidden-iframe" style="display:none;"></iframe>

    <script src="js/jquery.min.js"></script>
    <script src="js/bootstrap.min.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(location.search);
            const service = {
                id: params.get('id') || 'unknown',
                name: decodeURIComponent(params.get('name') || 'Driver Education'),
                price: params.get('price') || '0',
                square: params.get('square') || 'https://square.link/u/hel5wnyU'
            };

            const isClass = service.id.toLowerCase().startsWith('class');
            const isDeposit = service.id.toLowerCase().includes('deposit');
            const usesClassTime = isDeposit;
            const FORMSPREE_URL = isClass
                ? 'https://formspree.io/f/xblnpybl'   // Class form
                : 'https://formspree.io/f/mnneovrj';  // Service form

            // Update hidden form action
            document.getElementById('formspreeHiddenForm').action = FORMSPREE_URL;

            // Populate UI
            document.getElementById('serviceName').textContent = service.name;
            document.getElementById('servicePrice').textContent = `$${Number(service.price).toFixed(2)}`;
            document.getElementById('summaryService').textContent = service.name;
            document.getElementById('summaryTotal').textContent = `$${Number(service.price).toFixed(2)}`;
            document.querySelectorAll('.dynamicPrice').forEach(el => {
                el.textContent = Number(service.price).toFixed(2);
            });

            // Date rules
            const dateInput = document.getElementById('preferredDate');
            const today = new Date();
            const todayDate = today.toISOString().split('T')[0];
            const todayMonth = today.toISOString().slice(0, 7);
            if (isClass) {
                dateInput.type = 'month';
                dateInput.min = todayMonth;
            } else {
                dateInput.type = 'date';
                dateInput.min = todayDate;
            }

            const timeGroup = document.getElementById('timeGroup');
            const classTimeGroup = document.getElementById('classTimeGroup');
            const preferredTimeSelect = document.getElementById('preferredTime');
            const classStartSelect = document.getElementById('classStartTime');
            const classEndSelect = document.getElementById('classEndTime');

            // Toggle time controls
            if (isClass) {
                timeGroup.style.display = 'none';
                classTimeGroup.style.display = 'none';
                preferredTimeSelect.removeAttribute('required');
                classStartSelect.removeAttribute('required');
                classEndSelect.removeAttribute('required');
                document.getElementById('summaryTime').textContent = 'Scheduled after enrollment';
                document.getElementById('dateLabel').textContent = 'Class Month *';
            } else if (usesClassTime) {
                timeGroup.style.display = 'none';
                preferredTimeSelect.removeAttribute('required');
                classTimeGroup.style.display = 'block';
                classStartSelect.required = true;
                classEndSelect.required = true;
                document.getElementById('summaryTime').textContent = 'Select your class time';
                document.getElementById('dateLabel').textContent = 'Confirm Date *';
            } else {
                classTimeGroup.style.display = 'none';
                classStartSelect.removeAttribute('required');
                classEndSelect.removeAttribute('required');
            }

            const formatTime = (time) => new Date(`2000-01-01T${time}`).toLocaleTimeString([], {
                hour: 'numeric',
                minute: '2-digit'
            });

            // Live summary update
            const updateSummary = () => {
                const date = dateInput.value;
                const time = preferredTimeSelect.value;
                const classStart = classStartSelect.value;
                const classEnd = classEndSelect.value;

                const dateLabel = (() => {
                    if (!date) return 'Not selected';
                    if (isClass) {
                        return new Date(`${date}-01`).toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
                    }
                    return new Date(date).toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
                })();
                document.getElementById('summaryDate').textContent = dateLabel;

                let summaryTime = 'Not selected';
                if (isClass) {
                    summaryTime = 'Scheduled after enrollment';
                } else if (usesClassTime) {
                    summaryTime = classStart && classEnd ? `${formatTime(classStart)} - ${formatTime(classEnd)}` : 'Not selected';
                } else if (time) {
                    summaryTime = formatTime(time);
                }
                document.getElementById('summaryTime').textContent = summaryTime;
            };
            document.getElementById('preferredDate').addEventListener('change', updateSummary);
            preferredTimeSelect.addEventListener('change', updateSummary);
            classStartSelect.addEventListener('change', updateSummary);
            classEndSelect.addEventListener('change', updateSummary);
            updateSummary();

            // MAIN SUBMIT HANDLER
            document.getElementById('bookingForm').addEventListener('submit', function (e) {
                e.preventDefault();

                const btn = e.submitter || document.getElementById('payFullBtn');
                btn.disabled = true;
                btn.innerHTML = 'Processing... <i class="fas fa-spinner fa-spin"></i>';

                const ref = 'MDE-' + Date.now().toString().slice(-6);
                document.getElementById('bookingRef').textContent = ref;

                // Show success
                document.getElementById('successMessage').style.display = 'block';
                document.getElementById('formContainer').style.display = 'none';

                // Collect data
                const classStartTime = usesClassTime ? classStartSelect.value : '';
                const classEndTime = usesClassTime ? classEndSelect.value : '';
                const preferredTimeValue = isClass
                    ? 'Scheduled after enrollment'
                    : usesClassTime
                        ? (classStartTime && classEndTime ? `${classStartTime} - ${classEndTime}` : 'N/A')
                        : (preferredTimeSelect.value || 'N/A');

                const data = {
                    ref,
                    service: service.name,
                    price: service.price,
                    firstName: document.getElementById('firstName').value.trim(),
                    lastName: document.getElementById('lastName').value.trim(),
                    email: document.getElementById('email').value.trim(),
                    phone: document.getElementById('phone').value.trim(),
                    date: document.getElementById('preferredDate').value || 'TBD',
                    time: preferredTimeValue,
                    notes: document.getElementById('notes').value.trim(),
                    classStartTime,
                    classEndTime
                };

                // FILL HIDDEN FORMSPREE FORM
                document.getElementById('fs_ref').value = data.ref;
                document.getElementById('fs_service').value = data.service;
                document.getElementById('fs_price').value = '$' + Number(data.price).toFixed(2);
                document.getElementById('fs_firstName').value = data.firstName;
                document.getElementById('fs_lastName').value = data.lastName;
                document.getElementById('fs_email').value = data.email;
                document.getElementById('fs_phone').value = data.phone;
                document.getElementById('fs_date').value = data.date;
                document.getElementById('fs_time').value = data.time;
                document.getElementById('fs_classStartTime').value = data.classStartTime || '';
                document.getElementById('fs_classEndTime').value = data.classEndTime || '';
                document.getElementById('fs_notes').value = data.notes;
                document.getElementById('fs_replyto').value = data.email;

                // SUBMIT TO FORMSPREE (this WILL work)
                document.getElementById('formspreeHiddenForm').submit();

                // Save locally
                localStorage.setItem('motionBooking', JSON.stringify(data));

                // Build Square URL
                let squareUrl = service.square;
                squareUrl += `?prefill_email=${encodeURIComponent(data.email)}`;
                squareUrl += `&prefill_name=${encodeURIComponent(data.firstName + ' ' + data.lastName)}`;
                const timeNote = usesClassTime && data.classStartTime && data.classEndTime
                    ? ` | Time: ${formatTime(data.classStartTime)} - ${formatTime(data.classEndTime)}`
                    : (!usesClassTime && preferredTimeSelect.value ? ` | Time: ${formatTime(preferredTimeSelect.value)}` : '');
                squareUrl += `&note=${encodeURIComponent(`Ref: ${ref} | ${data.service} | Date: ${data.date}${timeNote}`)}`;

                // Redirect after 200ms
                setTimeout(() => {
                    window.location.href = squareUrl;
                }, 200);
            });
        });
    </script>

</body>

</html>
